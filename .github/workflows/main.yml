name: FinRobot CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------------- FRONTEND ----------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      # ---------------- BACKEND ----------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Test backend startup
        run: |
          cd backend
          python -c "import main; print('Backend OK')"

      # ---------------- DOCKER ----------------
      - name: Build Backend Docker Image
        run: |
          cd backend
          docker build -t finrobot-backend .

      - name: Build Frontend Docker Image
        run: |
          cd frontend
          docker build -t finrobot-frontend .